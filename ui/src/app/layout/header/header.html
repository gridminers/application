<a class="skip-link" href="#main-content">Zum Inhalt springen</a>
<header class="header">
  <div class="container header__inner">
    <a class="brand" routerLink="/" aria-label="Gridminers Startseite">
      @if (theme() === 'light') {
        <img
          class="brand__logo"
          ngSrc="logo.png"
          width="852"
          height="390"
          priority
          alt="BS|NETZ — Gridminers Braunschweig"
        />
      } @else {
        <span class="brand__mark" aria-hidden="true">⏚</span>
        <span class="brand__name">Gridminers</span>
        <span class="brand__city">Braunschweig</span>
      }
    </a>

    <div class="header__right">
      <nav class="nav" aria-label="Hauptnavigation">
        <a
          routerLink="/"
          routerLinkActive="nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav__link"
          >Start</a
        >
        <a routerLink="/sparte-assets" routerLinkActive="nav__link--active" class="nav__link"
          >Sparte / Assets</a
        >
        <a routerLink="/gewerke" routerLinkActive="nav__link--active" class="nav__link"
          >Gewerke</a
        >
        <a routerLink="/kostenvergleich" routerLinkActive="nav__link--active" class="nav__link"
          >Plan / Ist</a
        >
        <a routerLink="/strassen" routerLinkActive="nav__link--active" class="nav__link"
          >Straßendetails</a
        >
        <a routerLink="/karte" routerLinkActive="nav__link--active" class="nav__link"
          >Karte</a
        >
      </nav>

      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="
          theme() === 'light' ? 'Zu dunklem Design wechseln' : 'Zu hellem Design wechseln'
        "
        [attr.aria-pressed]="theme() === 'light'"
      >
        @if (theme() === 'light') {
          <svg
            class="theme-toggle__icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        } @else {
          <svg
            class="theme-toggle__icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            />
          </svg>
        }
      </button>
    </div>
  </div>
</header>
