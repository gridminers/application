<a class="skip-link" href="#main-content">Zum Inhalt springen</a>
<header class="header">
  <div class="container header__inner">
    <a class="brand" routerLink="/" aria-label="Gridminers Startseite">
      <span class="brand__mark" aria-hidden="true">⏚</span>
      <span class="brand__name">Gridminers</span>
      <span class="brand__city">Braunschweig</span>
    </a>

    <nav class="nav" aria-label="Hauptnavigation">
      <a
        routerLink="/"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav__link"
        >Start</a
      >
      <a routerLink="/sparte-assets" routerLinkActive="nav__link--active" class="nav__link"
        >Sparte / Assets</a
      >
      <a routerLink="/gewerke" routerLinkActive="nav__link--active" class="nav__link"
        >Gewerke</a
      >
      <a routerLink="/kostenvergleich" routerLinkActive="nav__link--active" class="nav__link"
        >Plan / Ist</a
      >
      <a routerLink="/strassen" routerLinkActive="nav__link--active" class="nav__link"
        >Straßendetails</a
      >
      <a routerLink="/karte" routerLinkActive="nav__link--active" class="nav__link"
        >Karte</a
      >
    </nav>
  </div>
</header>
