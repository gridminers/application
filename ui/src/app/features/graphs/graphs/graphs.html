<div class="container graphs">
  <header class="graphs__head">
    <h1 class="graphs__title">Graphen</h1>
    <p class="graphs__lead">
      Auswertung der Projektaufträge für das Netz Braunschweig. Basierend auf
      Mockdaten.
    </p>
  </header>

  <div class="graphs__grid">
    <app-chart-card
      title="Gesamtkosten je Sparte"
      description="Summe der Gesamtkosten aller Projekte, gruppiert nach Sparte."
    >
      <app-budget-by-division [data]="budgetBySparte()" />
    </app-chart-card>

    <app-chart-card
      title="Kostenarten gesamt"
      description="Aufteilung in Material-, Fremd-, Eigenleistungen, Ingenieurleistung Dritter und Zuschläge. Optional nach Sparte und Assetklasse filterbar."
    >
      <app-cost-composition [data]="costCompositionBySparte()" />
    </app-chart-card>

    <app-chart-card
      title="Zahlungsplan über die Jahre"
      description="Geplante Zahlungen je Kalenderjahr, über alle Projekte summiert."
    >
      <app-payment-plan [data]="paymentsByYear()" />
    </app-chart-card>

    <app-chart-card
      title="Preis pro Meter"
      description="Vergleich der Kosten je Meter Leitungslänge nach Projekt."
    >
      <app-price-per-meter [data]="pricePerMeter()" />
    </app-chart-card>

    <app-chart-card
      class="graphs__wide"
      title="Eigen- vs. Fremdleistung über die Jahre"
      description="Linien für Eigen- und Fremdleistungen je Geschäftsjahr; Balken (rechte Achse) zeigen die absolute Differenz, eingefärbt nach der höheren Seite."
    >
      <app-eigen-fremd-comparison [data]="eigenFremdByYear()" />
    </app-chart-card>
  </div>
</div>
