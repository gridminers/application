<div class="container graph-page">
  <header class="graph-page__head">
    <h1 class="graph-page__title">Karte</h1>
    <p class="graph-page__lead">
      Räumliche Übersicht der Projekte auf einer Karte von Braunschweig.
    </p>
  </header>

  <div class="graph-page__filters map-filter">
    <label class="map-filter__label" for="map-year-select">Geschäftsjahr</label>
    <select
      id="map-year-select"
      class="map-filter__input"
      [value]="selectedYear() ?? ''"
      (change)="onYearChange($any($event.target).value)"
    >
      <option value="">Alle Jahre</option>
      @for (year of years(); track year) {
        <option [value]="year">{{ year }}</option>
      }
    </select>
  </div>

  <div class="graph-page__body">
    <div
      #mapContainer
      class="map"
      role="application"
      aria-label="Interaktive OpenStreetMap-Karte von Braunschweig"
    ></div>
  </div>
</div>
