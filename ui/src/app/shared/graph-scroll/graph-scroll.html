<div #body class="graph-page__body" (scroll)="onScroll()">
  <ng-content />
</div>

@if (canScrollDown()) {
  <button type="button" class="graph-page__scroll-hint" (click)="scrollDown()">
    <span>Weitere Diagramme</span>
    <svg
      class="graph-page__scroll-hint-icon"
      viewBox="0 0 24 24"
      width="20"
      height="20"
      aria-hidden="true"
      focusable="false"
    >
      <path
        d="M6 9l6 6 6-6"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
}
