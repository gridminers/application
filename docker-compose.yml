services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/input:/app/input
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  parser:
    build:
      context: ./parser
      dockerfile: Containerfile
    command: ["--watch"]
    env_file:
      - ./parser/.env
    environment:
      # Override the .env value so the parser reaches the backend over the
      # internal Docker network instead of localhost.
      IMPORT_API_URL: http://backend:8000/api/applications/import/
    volumes:
      - ./parser/dump:/app/dump
      - ./parser/processed_files:/app/processed_files
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
